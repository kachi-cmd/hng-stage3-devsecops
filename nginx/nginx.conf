user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ---------------------------------------------------------------
    # JSON access log format
    # Writes to the shared HNG-nginx-logs volume at the required path.
    # Includes: source_ip, timestamp, method, path, status, response_size
    # Also captures X-Forwarded-For so the detector sees real client IPs.
    # ---------------------------------------------------------------
    log_format json_combined escape=json
        '{'
            '"source_ip":"$remote_addr",'
            '"http_x_forwarded_for":"$http_x_forwarded_for",'
            '"time_iso8601":"$time_iso8601",'
            '"request_method":"$request_method",'
            '"request_uri":"$request_uri",'
            '"status":$status,'
            '"body_bytes_sent":$body_bytes_sent,'
            '"http_referer":"$http_referer",'
            '"http_user_agent":"$http_user_agent",'
            '"request_time":$request_time,'
            '"upstream_response_time":"$upstream_response_time"'
        '}';

    access_log /var/log/nginx/hng-access.log json_combined;

    sendfile on;
    tcp_nopush on;
    keepalive_timeout 65;
    gzip on;

    # ---------------------------------------------------------------
    # Trust X-Forwarded-For from downstream load balancers / proxies.
    # set_real_ip_from covers common private ranges.
    # ---------------------------------------------------------------
    set_real_ip_from 10.0.0.0/8;
    set_real_ip_from 172.16.0.0/12;
    set_real_ip_from 192.168.0.0/16;
    real_ip_header X-Forwarded-For;
    real_ip_recursive on;

    # ---------------------------------------------------------------
    # Upstream: Nextcloud container
    # ---------------------------------------------------------------
    upstream nextcloud {
        server nextcloud:80;
        keepalive 32;
    }

    # ---------------------------------------------------------------
    # Main server block – forward all traffic to Nextcloud
    # ---------------------------------------------------------------
    server {
        listen 80;
        server_name _;

        # Large uploads for Nextcloud
        client_max_body_size 10G;
        client_body_timeout 300s;

        # Forward real IP to Nextcloud
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        location / {
            proxy_pass http://nextcloud;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;

            # Required for Nextcloud WebDAV
            proxy_buffering off;
            proxy_request_buffering off;
        }

        # Let's Encrypt / ACME challenge support
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
    }
}
